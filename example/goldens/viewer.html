<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden Animations — goldens</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; margin: 0; padding: 24px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: #fff; }
  .grid { display: flex; flex-wrap: wrap; gap: 24px; }
  .card { background: #16213e; border: 1px solid #0f3460; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; align-items: center; }
  .card img { max-width: 400px; background: #0a0a1a; border-radius: 8px; image-rendering: pixelated; }
  .card .label { margin-top: 12px; font-size: 13px; font-family: monospace; color: #a0a0b0; }
</style>
</head>
<body>
<h1>goldens</h1>
<div class="grid">
  <div class="card">
    <img src="example_button_press.apng" alt="example_button_press.apng">
    <div class="label">example_button_press.apng</div>
  </div>
  <div class="card">
    <img src="neo_bottom_nav_cta_float.apng" alt="neo_bottom_nav_cta_float.apng">
    <div class="label">neo_bottom_nav_cta_float.apng</div>
  </div>
  <div class="card">
    <img src="neo_circular_progress_spinner.apng" alt="neo_circular_progress_spinner.apng">
    <div class="label">neo_circular_progress_spinner.apng</div>
  </div>
  <div class="card">
    <img src="neo_snackbar_slide_in.apng" alt="neo_snackbar_slide_in.apng">
    <div class="label">neo_snackbar_slide_in.apng</div>
  </div>
</div>
</body>
</html>
