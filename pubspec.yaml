name: flutter_golden_animation
description: >-
  Animation golden testing for Flutter. Captures widget animation frames as
  lossless APNG golden files with pixel-perfect comparison, frame-level diff
  reporting, and an auto-generated HTML viewer for browsing animations locally.
version: 0.1.0
repository: https://github.com/bassiuz/flutter_golden_animation
issue_tracker: https://github.com/bassiuz/flutter_golden_animation/issues

topics:
  - testing
  - golden-test
  - animation
  - screenshot
  - apng

environment:
  sdk: ^3.7.1
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_test:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
